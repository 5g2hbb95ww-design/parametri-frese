<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Parametri Frese</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#2563eb">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">

        <!-- HEADER -->
        <header class="app-header">
            <h1>Parametri Frese</h1>
            <p>Gestione parametri con salvataggio locale</p>
        </header>

        <!-- LAYOUT PRINCIPALE -->
        <main class="app-layout">

            <!-- ===================== XY-Ae ===================== -->
            <section class="app-section">
                <div class="section-header">
                    <h2>XY-Ae</h2>
                    <p>Parametri asse XY</p>
                </div>

                <!-- RIGA 1 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 1</label>
                        <input type="text" id="xy_sx1" class="field-input">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 1</label>
                        <input type="text" id="xy_dx1" class="field-input">
                    </div>
                </div>

                <!-- RIGA 2 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 2</label>
                        <input type="text" id="xy_sx2" class="field-input">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 2</label>
                        <input type="text" id="xy_dx2" class="field-input">
                    </div>
                </div>

                <!-- AGGIUNGI QUI ALTRE RIGHE XY-Ae -->

                <div class="section-footer">
                    <button class="btn-primary" onclick="salvaXY()">Salva XY-Ae</button>
                </div>
            </section>

            <!-- ===================== Z-Ap ===================== -->
            <section class="app-section">
                <div class="section-header">
                    <h2>Z-Ap</h2>
                    <p>Parametri asse Z</p>
                </div>

                <!-- RIGA 1 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 1</label>
                        <input type="text" id="z_sx1" class="field-input">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 1</label>
                        <input type="text" id="z_dx1" class="field-input">
                    </div>
                </div>

                <!-- RIGA 2 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 2</label>
                        <input type="text" id="z_sx2" class="field-input">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 2</label>
                        <input type="text" id="z_dx2" class="field-input">
                    </div>
                </div>

                <!-- AGGIUNGI QUI ALTRE RIGHE Z-Ap -->

                <div class="section-footer">
                    <button class="btn-primary" onclick="salvaZ()">Salva Z-Ap</button>
                </div>
            </section>

        </main>

        <!-- FOOTER -->
        <footer class="app-footer">
            <p>Archivio parametri frese · LocalStorage attivo</p>
        </footer>

    </div>

    <!-- SERVICE WORKER -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

    <!-- JS PRINCIPALE -->
    <script src="app.js"></script>
</body>
</html>
