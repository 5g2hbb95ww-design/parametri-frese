<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parametri Frese</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚙️ Parametri Frese</h1>

  <nav class="menu-nav">
    <button id="btn-nuovo" class="nav-btn active">➕ Nuovo</button>
    <button id="btn-archivio" class="nav-btn">📚 Archivio</button>
  </nav>
</header>

<main>

<!-- ================= PAGINA NUOVO ================= -->
<section id="pagina-nuovo" class="page active">
  <section class="card">
    <h2>Nuovo Inserimento</h2>

    <div class="field">
      <div class="field-icon">🧩</div>
      <input id="denominazione_fresa" type="text" placeholder="Denominazione Fresa">
    </div>

    <div class="field-row">
      <div class="field">
        <div class="field-icon">📏</div>
        <input id="diametro" type="number" step="0.01" placeholder="Diametro">
      </div>

      <div class="field">
        <div class="field-icon">🛠️</div>
        <input id="ntaglientiinserti" type="number" placeholder="N.Taglienti/Inserti">
      </div>
    </div>

    <div class="field">
      <div class="field-icon">⚙️</div>
      <input id="s" type="number" step="0.01" placeholder="S">
    </div>

    <div class="field-row">
      <div class="field">
        <div class="field-icon">⏱️</div>
        <input id="mmin" type="number" step="0.01" placeholder="M/Minuto">
      </div>

      <div class="field field-calculated">
        <div class="field-icon">🚀</div>
        <input id="s_calc" type="number" placeholder="S calcolata" readonly>
      </div>
    </div>

    <div class="field">
      <div class="field-icon">📊</div>
      <input id="f" type="number" step="0.01" placeholder="F">
    </div>

    <div class="field-row">
      <div class="field">
        <div class="field-icon">🪛</div>
        <input id="av_ad" type="number" step="0.01" placeholder="Av. Ad">
      </div>

      <div class="field field-calculated">
        <div class="field-icon">📈</div>
        <input id="f_calc" type="number" placeholder="F calcolata" readonly>
      </div>
    </div>

    <div class="field">
      <div class="field-icon">⛰️</div>
      <input id="zap" type="number" step="0.01" placeholder="Z-Ap">
    </div>

    <div class="field-row">
      <div class="field">
        <div class="field-icon">🏭</div>
        <select id="materiale">
          <option>Acciaio</option>
          <option>Inox</option>
          <option>Ghisa</option>
          <option>Alluminio</option>
          <option>Titanio</option>
          <option>Ottone</option>
          <option>Rame</option>
          <option>Plastica</option>
          <option>Altro</option>
        </select>
      </div>

      <div class="field">
        <div class="field-icon">💧</div>
        <select id="refrigerante">
          <option>Acqua</option>
          <option>Aria</option>
          <option>Niente</option>
          <option>Acqua int.</option>
          <option>Aria int.</option>
        </select>
      </div>
    </div>

    <div class="field">
      <div class="field-icon">🔩</div>
      <input id="codice_fresa" type="text" placeholder="Codice fresa">
    </div>

    <div class="field">
      <div class="field-icon">🧱</div>
      <input id="codice_inserto" type="text" placeholder="Codice inserto">
    </div>

    <div class="field">
      <div class="field-icon">📝</div>
      <textarea id="dettagli" placeholder="Dettagli"></textarea>
    </div>

    <button id="salva">💾 Salva</button>
  </section>
</section>

<!-- ================= PAGINA ARCHIVIO ================= -->
<section id="pagina-archivio" class="page">
  <section class="card">
    <h2>📚 Archivio Frese</h2>

    <input id="ricerca" placeholder="Cerca...">

    <div id="lista"></div>

    <button id="csv">📄 Esporta CSV</button>
  </section>
</section>

</main>

<!-- ================= MODAL DI MODIFICA ================= -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Modifica Fresa</h2>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>

    <div class="card">

      <div class="field">
        <div class="field-icon">🧩</div>
        <input id="mod_denom" type="text" placeholder="Denominazione Fresa">
      </div>

      <div class="field-row">
        <div class="field">
          <div class="field-icon">📏</div>
          <input id="mod_diametro" type="number" placeholder="Diametro">
        </div>

        <div class="field">
          <div class="field-icon">🛠️</div>
          <input id="mod_taglienti" type="number" placeholder="N.Taglienti/Inserti">
        </div>
      </div>

      <div class="field">
        <div class="field-icon">⚙️</div>
        <input id="mod_s" type="number" placeholder="S">
      </div>

      <div class="field-row">
        <div class="field">
          <div class="field-icon">⏱️</div>
          <input id="mod_mmin" type="number" placeholder="M/Minuto">
        </div>

        <div class="field field-calculated">
          <div class="field-icon">🚀</div>
          <input id="mod_s_calc" type="number" placeholder="S calcolata" readonly>
        </div>
      </div>

      <div class="field">
        <div class="field-icon">📊</div>
        <input id="mod_f" type="number" placeholder="F">
      </div>

      <div class="field-row">
        <div class="field">
          <div class="field-icon">🪛</div>
          <input id="mod_av_ad" type="number" placeholder="Av. Ad">
        </div>

        <div class="field field-calculated">
          <div class="field-icon">📈</div>
          <input id="mod_f_calc" type="number" placeholder="F calcolata" readonly>
        </div>
      </div>

      <div class="field">
        <div class="field-icon">⛰️</div>
        <input id="mod_zap" type="number" placeholder="Z-Ap">
      </div>

      <div class="field-row">
        <div class="field">
          <div class="field-icon">🏭</div>
          <select id="mod_materiale">
            <option>Acciaio</option>
            <option>Inox</option>
            <option>Ghisa</option>
            <option>Alluminio</option>
            <option>Titanio</option>
            <option>Ottone</option>
            <option>Rame</option>
            <option>Plastica</option>
            <option>Altro</option>
          </select>
        </div>

        <div class="field">
          <div class="field-icon">💧</div>
          <select id="mod_refrigerante">
            <option>Acqua</option>
            <option>Aria</option>
            <option>Niente</option>
            <option>Acqua int.</option>
            <option>Aria int.</option>
          </select>
        </div>
      </div>

    </div>

    <div class="modal-actions">
      <button class="btn-annulla" id="modal-annulla">❌ Annulla</button>
      <button class="btn-salva-modifica" id="modal-salva">💾 Salva</button>
    </div>
  </div>
</div>
