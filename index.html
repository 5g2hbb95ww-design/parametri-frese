<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Parametri Frese & Programmazione</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="glass header">
    <h1>Parametri Frese & Schede Lavoro</h1>
    <select id="viewSelect">
      <option value="nuovo">Nuova fresa</option>
      <option value="archivio">Archivio frese</option>
      <option value="programmazione">Programmazione</option>
    </select>
  </header>

  <main>
    <!-- PAGINA NUOVA FRESA -->
    <section id="page-nuovo" class="page active">
      <div class="card glass volumetric">
        <h2>Nuova fresa</h2>

        <label>Denominazione fresa</label>
        <input id="denominazione_fresa" type="text">

        <label>Diametro (mm)</label>
        <input id="diametro" type="number" step="0.01">

        <label>Numero taglienti</label>
        <input id="taglienti" type="number">

        <label>S (giri/min)</label>
        <input id="s" type="number">

        <label>F (mm/min)</label>
        <input id="f" type="number">

        <label>Velocità di taglio (m/min)</label>
        <input id="mmin" type="number" step="0.1">

        <label>S calcolata (giri/min)</label>
        <input id="s_calc" type="number">

        <label>Avanzamento per dente (mm/dente)</label>
        <input id="avanzamento" type="number" step="0.01">

        <label>F calcolata (mm/min)</label>
        <input id="f_calc" type="number" step="0.1">

        <label>Profondità Z Ap (mm)</label>
        <input id="zap" type="number" step="0.01">

        <label>Passo laterale Ae (mm)</label>
        <input id="xyae" type="number" step="0.01">

        <label>Codice fresa</label>
        <input id="codice_fresa" type="text">

        <label>Codice inserto</label>
        <input id="codice_inserto" type="text">

        <label>Materiale</label>
        <select id="materiale"></select>

        <label>Refrigerante</label>
        <select id="refrigerante"></select>

        <label>Dettagli / Note</label>
        <textarea id="dettagli" rows="3"></textarea>

        <button id="btnSalva" class="btn-primary">Salva fresa</button>
      </div>
    </section>

    <!-- PAGINA ARCHIVIO FRESE -->
    <section id="page-archivio" class="page">
      <div class="card glass volumetric">
        <h2>Archivio frese</h2>

        <label>Ordina per</label>
        <select id="sortSelect">
          <option value="denominazione">Denominazione</option>
          <option value="diametro">Diametro</option>
          <option value="materiale">Materiale</option>
        </select>

        <label>Ordine</label>
        <select id="orderSelect">
          <option value="asc">Crescente</option>
          <option value="desc">Decrescente</option>
        </select>

        <div id="lista"></div>

        <button id="btnExport" class="btn-primary">Esporta CSV</button>
      </div>
    </section>

    <!-- PAGINA PROGRAMMAZIONE / SCHEDA LAVORO -->
    <section id="page-programmazione" class="page">
      <div class="card glass volumetric">
        <h2>Programmazione / Scheda Lavoro</h2>

        <label>Macchina CNC</label>
        <input id="prog_macchina" type="text" placeholder="Es. DMG DMU 50">

        <label>Commessa</label>
        <input id="prog_commessa" type="text" placeholder="Es. ORD-2026-145">

        <label>Numero disegno</label>
        <input id="prog_disegno" type="text" placeholder="Es. DWG-5821">

        <label>Revisione disegno</label>
        <input id="prog_rev" type="text" placeholder="Es. Rev. 03">

        <label>Materiale grezzo</label>
        <input id="prog_grezzo" type="text" placeholder="Es. C45, 80x80x50">

        <label>Tempo programmazione (minuti)</label>
        <input id="prog_tempo" type="number" step="1">

        <label>Operatore CNC</label>
        <input id="prog_operatore" type="text" placeholder="Es. Marco R.">

        <label>Stato lavoro</label>
        <select id="prog_stato">
          <option value="in_programmazione">In programmazione</option>
          <option value="in_produzione">In produzione</option>
          <option value="sospeso">Sospeso</option>
          <option value="programmato">Programmato</option>
          <option value="finito">Programmato e prodotto</option>
        </select>

        <label>Note tecniche</label>
        <textarea id="prog_note" rows="4"></textarea>

        <button id="btnSalvaProgrammazione" class="btn-primary">Salva scheda lavoro</button>

        <h3>Storico schede lavoro</h3>
        <div id="prog_lista"></div>

        <h3>Timeline lavoro</h3>
        <div id="prog_timeline"></div>

        <button id="btnExportPDF" class="btn-primary">Esporta PDF</button>
      </div>
    </section>
  </main>

  <!-- MODAL MODIFICA FRESA -->
  <div id="modalEdit" class="modal hidden">
    <div class="modal-content glass">
      <h3>Modifica fresa</h3>

      <label>Denominazione fresa</label>
      <input id="edit_denominazione" type="text">

      <label>Diametro (mm)</label>
      <input id="edit_diametro" type="number" step="0.01">

      <label>Numero taglienti</label>
      <input id="edit_taglienti" type="number">

      <label>S (giri/min)</label>
      <input id="edit_s" type="number">

      <label>Avanzamento per dente (mm/dente)</label>
      <input id="edit_avanzamento" type="number" step="0.01">

      <label>Materiale</label>
      <select id="edit_materiale"></select>

      <label>Refrigerante</label>
      <select id="edit_refrigerante"></select>

      <label>Dettagli / Note</label>
      <textarea id="edit_dettagli" rows="3"></textarea>

      <button id="btnUpdate" class="btn-primary">Aggiorna</button>
      <button id="btnCloseModal" class="btn-secondary">Chiudi</button>
    </div>
  </div>

  <!-- MODAL MODIFICA SCHEDA LAVORO -->
  <div id="modalEditProg" class="modal hidden">
    <div class="modal-content glass">
      <h3>Modifica scheda lavoro</h3>

      <label>Macchina CNC</label>
      <input id="edit_prog_macchina" type="text">

      <label>Commessa</label>
      <input id="edit_prog_commessa" type="text">

      <label>Numero disegno</label>
      <input id="edit_prog_disegno" type="text">

      <label>Revisione</label>
      <input id="edit_prog_rev" type="text">

      <label>Materiale grezzo</label>
      <input id="edit_prog_grezzo" type="text">

      <label>Tempo programmazione</label>
      <input id="edit_prog_tempo" type="number">

      <label>Operatore CNC</label>
      <input id="edit_prog_operatore" type="text">

      <label>Stato lavoro</label>
      <select id="edit_prog_stato">
        <option value="in_programmazione">In programmazione</option>
        <option value="in_produzione">In produzione</option>
        <option value="sospeso">Sospeso</option>
        <option value="programmato">Programmato</option>
        <option value="finito">Programmato e prodotto</option>
      </select>

      <label>Note tecniche</label>
      <textarea id="edit_prog_note" rows="4"></textarea>

      <button id="btnUpdateProg" class="btn-primary">Aggiorna</button>
      <button id="btnCloseModalProg" class="btn-secondary">Chiudi</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
