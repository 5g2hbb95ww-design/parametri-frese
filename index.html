<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Programmazione CNC</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0f1c" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="dark">

  <!-- MENU LATERALE -->
  <div id="sideMenu" class="side-menu hidden">
    <div class="side-menu-content glass">
      <div class="side-menu-item" data-page="dashboard">Dashboard</div>
      <div class="side-menu-item" data-page="nuovo">Nuova Fresa</div>
      <div class="side-menu-item" data-page="archivio">Archivio Frese</div>
      <div class="side-menu-item" data-page="programmazione">Programmazione</div>
      <div class="side-menu-item" data-page="timeline">Timeline</div>
    </div>
  </div>

  <!-- SELECTOR PAGINE -->
  <header>
    <div class="header-row">
      <select id="viewSelect">
        <option value="dashboard">Dashboard</option>
        <option value="nuovo">Nuova Fresa</option>
        <option value="archivio">Archivio Frese</option>
        <option value="programmazione">Programmazione</option>
        <option value="timeline">Timeline</option>
      </select>
    </div>

    <div class="theme-toggle">
      <button id="btnTheme" class="btn-theme">
        <span id="themeIcon"></span>
      </button>
    </div>
  </header>

  <!-- CONTENUTO PAGINE -->
  <main>
    <div id="page-dashboard" class="page"></div>
    <div id="page-nuovo" class="page"></div>
    <div id="page-archivio" class="page"></div>
    <div id="page-programmazione" class="page"></div>
    <div id="page-timeline" class="page"></div>
  </main>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- PULSANTE MENU INFERIORE -->
  <div id="menuButton" class="menu-button">
    <svg viewBox="0 0 32 32" fill="currentColor">
      <rect x="8" y="10" width="16" height="2" rx="1"/>
      <rect x="8" y="15" width="16" height="2" rx="1"/>
      <rect x="8" y="20" width="16" height="2" rx="1"/>
    </svg>
  </div>

  <!-- FIREBASE v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- CONFIG -->
  <script src="firebase.config.js"></script>

  <!-- APP PRINCIPALE -->
  <script src="app.js"></script>

</body>
</html>
