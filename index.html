<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parametri Frese</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<!-- iPhone / iPad -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Parametri Frese">
<meta name="format-detection" content="telephone=no">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" sizes="192x192" href="icon/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon/icon-512.png">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚙️ Parametri Frese</h1>
  
  <nav class="menu-nav">
    <button id="btn-nuovo" class="nav-btn active">➕ Nuovo</button>
    <button id="btn-archivio" class="nav-btn">📚 Archivio</button>
  </nav>
</header>

<main>

<!-- ============== PAGINA 1: NUOVO INSERIMENTO ============== -->
<section id="pagina-nuovo" class="page active">
  <section class="card">
    <h2>Nuovo Inserimento</h2>

    <!-- Denominazione Fresa -->
    <textarea id="denominazione_fresa" placeholder="Denominazione Fresa"></textarea>

    <!-- Diametro + N.Taglienti -->
    <div class="row">
      <input id="diametro" type="number" step="0.01" placeholder="Diametro">
      <input id="ntaglientiinserti" type="number" placeholder="N.Taglienti/Inserti">
    </div>

    <!-- S + F -->
    <div class="row">
      <input id="s" type="number" step="0.01" placeholder="S">
      <input id="f" type="number" step="0.01" placeholder="F">
    </div>

    <!-- M/Minuto + S calcolata -->
    <div class="row">
      <input id="mmin" type="number" step="0.01" placeholder="M/Minuto">
      <input id="s_calc" type="number" step="0.01" placeholder="S calcolata" readonly>
    </div>

    <!-- Avanzamento Ad + F calcolata -->
    <div class="row">
      <input id="av_ad" type="number" step="0.01" placeholder="Avanzamento Ad">
      <input id="f_calc" type="number" step="0.01" placeholder="F calcolata" readonly>
    </div>

    <!-- Z-Ap + XY-Ae -->
<div class="row">
  <textarea id="zap" placeholder="Z-Ap"></textarea>

  <div class="xy-ae-cell">
    <textarea id="xyae" placeholder="XY-Ae"></textarea>

    <select id="xyae_unit" class="xy-ae-select">
      <option value="mm">mm</option>
      <option value="%">%</option>
    </select>
  </div>
</div>
    
    <!-- Materiale + Refrigerante -->
    <div class="row">
      <select id="materiale">
        <option>Acciaio</option>
        <option>Temprato</option>
        <option>Inox</option>
        <option>Ghisa</option>
        <option>Alluminio</option>
        <option>Titanio</option>
        <option>Ottone</option>
        <option>Rame</option>
        <option>Plastica</option>
        <option>Altro</option>
      </select>

      <select id="refrigerante">
        <option>Acqua</option>
        <option>Aria</option>
        <option>Niente</option>
        <option>Acqua int.</option>
        <option>Aria int.</option>
      </select>
    </div>

    <!-- Codice Fresa -->
    <textarea id="codice_fresa" placeholder="Codice fresa"></textarea>

    <!-- Codice Inserto -->
    <textarea id="codice_inserto" placeholder="Codice inserto"></textarea>

    <!-- Dettagli -->
    <textarea id="dettagli" placeholder="Dettagli"></textarea>

    <button id="salva">💾 Salva</button>
  </section>
</section>

<!-- ============== PAGINA 2: ARCHIVIO FRESE ============== -->
<section id="pagina-archivio" class="page">
  <section class="card">
    <h2>📚 Archivio Frese</h2>
    <input id="ricerca" placeholder="Cerca...">
    <div id="lista"></div>
    <button id="csv" style="margin-top: 20px; width: 100%;">📄 Esporta CSV</button>
  </section>
</section>

</main>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Modifica Fresa</h2>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>

    <textarea id="mod-denominazione_fresa" placeholder="Denominazione Fresa"></textarea>

    <div class="row">
      <input id="mod-diametro" type="number" step="0.01" placeholder="Diametro">
      <input id="mod-ntaglientiinserti" type="number" placeholder="N.Taglienti/Inserti">
    </div>

    <div class="row">
      <input id="mod-s" type="number" step="0.01" placeholder="S">
      <input id="mod-f" type="number" step="0.01" placeholder="F">
    </div>
      
    <div class="row">
      <input id="mod-mmin" type="number" step="0.01" placeholder="M/Minuto">
      <input id="mod-s_calc" type="number" step="0.01" placeholder="S calcolata" readonly>
    </div>


    <div class="row">
      <input id="mod-av_ad" type="number" step="0.01" placeholder="Avanzamento Ad">
      <input id="mod-f_calc" type="number" step="0.01" placeholder="F calcolata" readonly>
    </div>

    
  <div class="row">
  <input id="mod-zap" type="number" step="0.01" placeholder="Z-Ap">

  <div class="xy-ae-cell">
    <input id="mod-xyae_val" type="number" step="0.01" placeholder="XY-Ae">
    <select id="mod-xyae_unit">
      <option value="mm">mm</option>
      <option value="%">%</option>
    </select>
  </div>
</div>


    <div class="row">
      <select id="mod-materiale">
        <option>Acciaio</option>
        <option>Temprato</option>
        <option>Inox</option>
        <option>Ghisa</option>
        <option>Alluminio</option>
        <option>Titanio</option>
        <option>Ottone</option>
        <option>Rame</option>
        <option>Plastica</option>
        <option>Altro</option>
      </select>

      <select id="mod-refrigerante">
        <option>Acqua</option>
        <option>Aria</option>
        <option>Niente</option>
        <option>Acqua int.</option>
        <option>Aria int.</option>
      </select>
    </div>

    <textarea id="mod-codice_fresa" placeholder="Codice fresa"></textarea>
    <textarea id="mod-codice_inserto" placeholder="Codice inserto"></textarea>
    <textarea id="mod-dettagli" placeholder="Dettagli"></textarea>

    <div class="modal-actions">
      <button class="btn-annulla" id="modal-annulla">❌ Annulla</button>
      <button class="btn-salva-modifica" id="modal-salva">✅ Salva</button>
    </div>
  </div>
</div>

<button id="installaApp" style="margin:20px; padding:10px; display:none;">
📲 Installa App
</button>

<script src="app.js"></script>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installaApp').style.display = 'block';
});

document.getElementById('installaApp').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
});
</script>

</body>
</html>
