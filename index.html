<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Parametri Fresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="app-title">Parametri Fresa</div>

    <!-- MENU A TENDINA: Nuovo / Archivio / Programmazione -->
    <div class="view-selector">
      <select id="viewSelect">
        <option value="nuovo">Nuovo</option>
        <option value="archivio">Archivio</option>
        <option value="programmazione">Programmazione</option>
      </select>
    </div>
  </header>

  <main>
    <!-- PAGINA NUOVO (5 CARD VISIONOS) -->
    <section id="page-nuovo" class="page active">

      <!-- CARD 1: DATI FRESA -->
      <div class="card glass volumetric">
        <h2>Dati fresa</h2>

        <label>Denominazione fresa</label>
        <input id="denominazione_fresa" type="text" autocomplete="off">

        <div class="row">
          <div class="col">
            <label>Diametro (mm)</label>
            <input id="diametro" type="number" step="0.01">
          </div>
          <div class="col">
            <label>N. taglienti</label>
            <input id="taglienti" type="number" step="1">
          </div>
        </div>
      </div>

      <!-- CARD 2: PARAMETRI DI TAGLIO -->
      <div class="card glass volumetric">
        <h2>Parametri di taglio</h2>

        <div class="row">
          <div class="col">
            <label>S (giri/min)</label>
            <input id="s" type="number" step="1">
          </div>
          <div class="col">
            <label>F (mm/giro)</label>
            <input id="f" type="number" step="0.01">
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>M/min (velocità di taglio)</label>
            <input id="mmin" type="number" step="0.1">
          </div>
          <div class="col">
            <label>S calcolata (giri/min)</label>
            <input id="s_calc" type="number" step="1" readonly>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>Avanzamento (mm/dente)</label>
            <input id="avanzamento" type="number" step="0.01">
          </div>
          <div class="col">
            <label>F calcolata (mm/min)</label>
            <input id="f_calc" type="number" step="0.1" readonly>
          </div>
        </div>
      </div>

      <!-- CARD 3: AVANZAMENTI -->
      <div class="card glass volumetric">
        <h2>Profondità / Passate</h2>

        <div class="row">
          <div class="col">
            <label>Z Ap (profondità assiale)</label>
            <input id="zap" type="number" step="0.01">
          </div>
          <div class="col">
            <label>XY Ae (profondità radiale)</label>
            <input id="xyae" type="number" step="0.01">
          </div>
        </div>
      </div>

      <!-- CARD 4: CODICI -->
      <div class="card glass volumetric">
        <h2>Codici utensile</h2>

        <label>Codice fresa</label>
        <input id="codice_fresa" type="text" autocomplete="off">

        <label>Codice inserto</label>
        <input id="codice_inserto" type="text" autocomplete="off">
      </div>

      <!-- CARD 5: DETTAGLI + SALVA -->
      <div class="card glass volumetric">
        <h2>Dettagli lavorazione</h2>

        <div class="row">
          <div class="col">
            <label>Materiale</label>
            <input id="materiale" type="text" autocomplete="off">
          </div>
          <div class="col">
            <label>Refrigerante</label>
            <input id="refrigerante" type="text" autocomplete="off">
          </div>
        </div>

        <label>Dettagli / note</label>
        <textarea id="dettagli" rows="3"></textarea>

        <button id="btnSalva" class="btn-primary">Salva in archivio</button>
      </div>
    </section>

    <!-- PAGINA ARCHIVIO -->
    <section id="page-archivio" class="page">
      <div class="card glass volumetric">
        <h2>Archivio frese</h2>
        <div id="lista"></div>
      </div>
    </section>

    <!-- PAGINA PROGRAMMAZIONE (PLACEHOLDER) -->
    <section id="page-programmazione" class="page">
      <div class="card glass volumetric">
        <h2>Programmazione</h2>
        <p>Qui in futuro inseriremo i dati di programmazione (cicli, strategie, ecc.).</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
