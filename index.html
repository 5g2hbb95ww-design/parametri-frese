<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Parametri Fresa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
<div class="app-title">Parametri Fresa</div>
  <div class="header-row">
    <div class="view-selector">
      <select id="viewSelect">
        <option value="nuovo">Nuovo</option>
        <option value="archivio">Archivio</option>
        <option value="programmazione">Programmazione</option>
      </select>
    </div>
    
    <div class="theme-toggle">
      <button id="btnTheme" class="btn-theme">🌙</button>
    </div>
  </div>
  </header>

  <main>
    <!-- PAGINA NUOVO -->
    <section id="page-nuovo" class="page active">

      <!-- CARD 1 -->
      <div class="card glass volumetric">
        <h2>Dati fresa</h2>

        <label>Denominazione fresa</label>
        <input id="denominazione_fresa" type="text">

        <div class="row">
          <div class="col">
            <label>Diametro (mm)</label>
            <input id="diametro" type="number" step="0.01">
          </div>
          <div class="col">
            <label>N. taglienti</label>
            <input id="taglienti" type="number">
          </div>
        </div>
      </div>

      <!-- CARD 2 -->
      <div class="card glass volumetric">
        <h2>Parametri di taglio</h2>

        <div class="row">
          <div class="col">
            <label>S (giri/min)</label>
            <input id="s" type="number">
          </div>
          <div class="col">
            <label>F (mm/giro)</label>
            <input id="f" type="number" step="0.01">
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>M/min</label>
            <input id="mmin" type="number" step="0.1">
          </div>
          <div class="col">
            <label>S calcolata</label>
            <input id="s_calc" type="number" readonly>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label>Avanzamento (mm/dente)</label>
            <input id="avanzamento" type="number" step="0.01">
          </div>
          <div class="col">
            <label>F calcolata (mm/min)</label>
            <input id="f_calc" type="number" readonly>
          </div>
        </div>
      </div>

      <!-- CARD 3 -->
      <div class="card glass volumetric">
        <h2>Profondità / Passate</h2>

        <div class="row">
          <div class="col">
            <label>Z Ap</label>
            <input id="zap" type="number" step="0.01">
          </div>
          <div class="col">
            <label>XY Ae</label>
            <input id="xyae" type="number" step="0.01">
          </div>
        </div>
      </div>

      <!-- CARD 4 -->
      <div class="card glass volumetric">
        <h2>Codici utensile</h2>

        <label>Codice fresa</label>
        <input id="codice_fresa" type="text">

        <label>Codice inserto</label>
        <input id="codice_inserto" type="text">
      </div>

      <!-- CARD 5 -->
      <div class="card glass volumetric">
        <h2>Dettagli lavorazione</h2>

        <div class="row">
          <div class="col">
            <label>Materiale</label>
            <select id="materiale"></select>
          </div>
          <div class="col">
            <label>Refrigerante</label>
            <select id="refrigerante"></select>
          </div>
        </div>

        <label>Dettagli</label>
        <textarea id="dettagli" rows="3"></textarea>

        <button id="btnSalva" class="btn-primary">Salva in archivio</button>
      </div>
    </section>

    <!-- PAGINA ARCHIVIO -->
    <section id="page-archivio" class="page">
      <div class="card glass volumetric">
        <h2>Archivio frese</h2>

        <label>Ordina per</label>
        <select id="sortSelect">
          <option value="diametro">Diametro</option>
          <option value="materiale">Materiale</option>
          <option value="codiceFresa">Codice fresa</option>
          <option value="refrigerante">Refrigerante</option>
          <option value="mmin">Velocità di taglio (M/min)</option>
          <option value="fCalc">Avanzamento (F calcolata)</option>
        </select>

        <label>Ordine</label>
        <select id="orderSelect">
          <option value="asc">Crescente</option>
          <option value="desc">Decrescente</option>
        </select>

        <button id="btnExport" class="btn-primary">Esporta CSV</button>

        <div id="lista"></div>
      </div>
    </section>

    <!-- PAGINA PROGRAMMAZIONE -->
    <section id="page-programmazione" class="page">

  <!-- CARD: NUOVA SCHEDA -->
  <div class="card glass volumetric">
    <h2>Nuova scheda lavoro</h2>

    <label>Macchina</label>
<select id="prog_macchina">
  <option value="">—</option>
  <option>Duravertical 3Ax (45)</option>
  <option>Duravertical 3Ax (46)</option>
  <option>NVX 5060 (58)</option>
  <option>Okuma (59)</option>
  <option>DMF-200/7 (57)</option>
  <option>DMU 65 5Axis (89)</option>
  <option>DMU 75 5Axis (90)</option>
</select>


    <label>Commessa</label>
    <input id="prog_commessa" type="text">

    <label>Disegno</label>
    <input id="prog_disegno" type="text">

    <label>Revisione</label>
    <input id="prog_rev" type="text">

    <label>Tempo programmazione (min)</label>
    <input id="prog_tempo" type="number">

    <label>Operatore CNC</label>
<select id="prog_operatore">
  <option value="">—</option>
  <option>Marco T.</option>
  <option>Nicola B.</option>
  <option>Roberto Q.</option>
  <option>Daniel D.</option>
  <option>Igor B.</option>
  <option>Altri</option>
</select>


    <label>Stato</label>
    <select id="prog_stato">
      <option value="in_programmazione">In programmazione</option>
      <option value="programmato">Programmato</option>
      <option value="in_produzione">In produzione</option>
      <option value="sospeso">Sospeso</option>
      <option value="finito">Finito</option>
    </select>

    <label>Note</label>
    <textarea id="prog_note" rows="3"></textarea>

    <button id="btnSalvaProgrammazione" class="btn-primary">Salva scheda</button>
  </div>

  <!-- CARD: ARCHIVIO -->
  <div class="card glass volumetric">
    <h2>Archivio schede</h2>
    <div id="prog_progress" class="prog-progress"></div>
    <div id="prog_lista"></div>
  </div>

  <!-- CARD: TIMELINE -->
  <div class="card glass volumetric">
    <h2>Timeline</h2>
    <div id="prog_timeline"></div>

    <button id="btnExportPDF" class="btn-primary">Esporta scheda TXT</button>
  </div>

</section>

  </main>

  <!-- MODAL MODIFICA -->
  <div id="modalEdit" class="modal hidden">
    <div class="modal-content glass volumetric">
      <h2>Modifica fresa</h2>

      <label>Denominazione</label>
      <input id="edit_denominazione" type="text">

      <label>Diametro</label>
      <input id="edit_diametro" type="number">

      <label>Taglienti</label>
      <input id="edit_taglienti" type="number">

      <label>S</label>
      <input id="edit_s" type="number">

      <label>Avanzamento</label>
      <input id="edit_avanzamento" type="number">

      <label>Materiale</label>
      <select id="edit_materiale"></select>

      <label>Refrigerante</label>
      <select id="edit_refrigerante"></select>

      <label>Dettagli</label>
      <textarea id="edit_dettagli"></textarea>

      <button id="btnUpdate" class="btn-primary">Aggiorna</button>
      <button id="btnCloseModal" class="btn-secondary">Chiudi</button>
    </div>
  </div>

  <script src="app.js"></script>
  
  <div id="toast" class="toast hidden">Scheda salvata ✔</div>
</body>
</html>
