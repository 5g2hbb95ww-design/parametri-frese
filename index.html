<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parametri Frese</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>⚙️ Parametri Frese</h1>
  <nav class="menu-nav">
    <button id="btn-nuovo" class="nav-btn active">➕ Nuovo</button>
    <button id="btn-archivio" class="nav-btn">📚 Archivio</button>
    <button id="btn-stile" class="nav-btn">🎨 Stile</button>
  </nav>
</header>

<main>

<!-- ================= PAGINA NUOVO ================= -->
<section id="pagina-nuovo" class="page active">
  <section class="card">
    <h2>Nuovo Inserimento</h2>

    <textarea id="denominazione_fresa" placeholder="Denominazione Fresa"></textarea>

    <div class="row">
      <input id="diametro" type="number" step="0.01" placeholder="Diametro">
      <input id="ntaglientiinserti" type="number" placeholder="N.Taglienti/Inserti">
    </div>

    <div class="row">
      <input id="s" type="number" step="0.01" placeholder="S">
      <input id="f" type="number" step="0.01" placeholder="F">
    </div>

    <div class="row">
      <input id="mmin" type="number" step="0.01" placeholder="M/Minuto">
      <input id="s_calc" type="number" step="0.01" placeholder="S calcolata" readonly>
    </div>

    <div class="row">
      <input id="av_ad" type="number" step="0.01" placeholder="Avanzamento Ad">
      <input id="f_calc" type="number" step="0.01" placeholder="F calcolata" readonly>
    </div>

    <div class="row">
      <textarea id="zap" placeholder="Z-Ap" class="cell"></textarea>

      <div class="xy-ae-wrapper cell">
        <textarea id="xyae" placeholder="XY-Ae"></textarea>
        <select id="xyae_unit" class="xy-ae-select">
          <option value="mm">mm</option>
          <option value="%">%</option>
        </select>
      </div>
    </div>

    <div class="row">
      <select id="materiale">
        <option>Acciaio</option>
        <option>Temprato</option>
        <option>Inox</option>
        <option>Ghisa</option>
        <option>Alluminio</option>
        <option>Titanio</option>
        <option>Ottone</option>
        <option>Rame</option>
        <option>Plastica</option>
        <option>Altro</option>
      </select>

      <select id="refrigerante">
        <option>Acqua</option>
        <option>Aria</option>
        <option>Niente</option>
        <option>Acqua int.</option>
        <option>Aria int.</option>
      </select>
    </div>

    <textarea id="codice_fresa" placeholder="Codice fresa"></textarea>
    <textarea id="codice_inserto" placeholder="Codice inserto"></textarea>
    <textarea id="dettagli" placeholder="Dettagli"></textarea>

    <button id="salva">💾 Salva</button>
  </section>
</section>

<!-- ================= PAGINA ARCHIVIO ================= -->
<section id="pagina-archivio" class="page">
  <section class="card">
    <h2>📚 Archivio Frese</h2>
    <input id="ricerca" placeholder="Cerca...">
    <div id="lista"></div>

    <div class="riga-actions">
      <button id="btn-export-csv">📤 Esporta CSV</button>
      <input type="file" id="input-import-csv" accept=".csv" style="display:none;">
      <button id="btn-import-csv">📥 Importa CSV</button>
    </div>
  </section>
</section>

<!-- ================= PAGINA STILE ================= -->
<section id="pagina-stile" class="page">
  <section class="card">
    <h2>Impostazioni Stile</h2>

    <label>Colore sfondo app
      <input type="color" id="ctrl-colore-sfondo">
    </label>

    <label>Colore testo
      <input type="color" id="ctrl-colore-testo">
    </label>

    <label>Colore celle
      <input type="color" id="ctrl-cella-bg">
    </label>

    <label>Colore campi input
      <input type="color" id="ctrl-campo-bg">
    </label>

    <label>Colore card
      <input type="color" id="ctrl-card-bg">
    </label>

    <label>Colore righe archivio
      <input type="color" id="ctrl-riga-bg">
    </label>

    <label>Colore nav
      <input type="color" id="ctrl-nav-bg">
    </label>

    <label>Colore nav attivo
      <input type="color" id="ctrl-nav-active">
    </label>

    <label>Colore bottone Salva
      <input type="color" id="ctrl-btn-salva">
    </label>

    <label>Colore bottone Modifica
      <input type="color" id="ctrl-btn-modifica">
    </label>

    <label>Colore bottone Elimina
      <input type="color" id="ctrl-btn-elimina">
    </label>

    <label>Colore bottone Annulla
      <input type="color" id="ctrl-btn-annulla">
    </label>

    <label>Radius celle
      <input type="range" id="ctrl-cella-radius" min="0" max="40">
    </label>

    <label>Radius input
      <input type="range" id="ctrl-campo-radius" min="0" max="40">
    </label>

    <label>Radius card
      <input type="range" id="ctrl-card-radius" min="0" max="40">
    </label>

    <label>Radius bottoni
      <input type="range" id="ctrl-btn-radius" min="0" max="40">
    </label>

    <label>Padding campi
      <input type="range" id="ctrl-campo-padding" min="4" max="30">
    </label>

    <label>Font campi
      <input type="range" id="ctrl-campo-font" min="10" max="30">
    </label>

    <label>Ombra card
      <input type="text" id="ctrl-card-shadow" placeholder="es: 0 4px 12px rgba(0,0,0,0.25)">
    </label>

    <label>Ombra celle
      <input type="text" id="ctrl-cella-shadow" placeholder="es: inset 0 0 10px rgba(255,255,255,0.2)">
    </label>

    <label>Ombra righe archivio
      <input type="text" id="ctrl-riga-shadow" placeholder="es: 0 4px 12px rgba(0,0,0,0.3)">
    </label>

    <label>Colore bordo modifica
      <input type="color" id="ctrl-edit-outline">
    </label>

    <label>Colore maniglie
      <input type="color" id="ctrl-edit-handle-bg">
    </label>

    <label>Dimensione maniglie
      <input type="range" id="ctrl-edit-handle-size" min="6" max="40">
    </label>

    <label>Colore maniglia movimento
      <input type="color" id="ctrl-edit-move-bg">
    </label>

    <div class="riga-actions">
      <button onclick="resetStyle()">🔄 Reset Stile</button>
      <button onclick="resetLayout()">📐 Reset Layout Celle</button>
      <button onclick="setTheme('light')">🌞 Tema Chiaro</button>
      <button onclick="setTheme('dark')">🌙 Tema Scuro</button>
    </div>
  </section>
</section>

</main>

<!-- ================= MODAL ================= -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Modifica Fresa</h2>
      <button class="modal-close" id="modal-close-btn">&times;</button>
    </div>

    <textarea id="mod-denominazione_fresa" placeholder="Denominazione Fresa"></textarea>

    <div class="row">
      <input id="mod-diametro" type="number" step="0.01" placeholder="Diametro">
      <input id="mod-ntaglientiinserti" type="number" placeholder="N.Taglienti/Inserti">
    </div>

    <div class="row">
      <input id="mod-s" type="number" step="0.01" placeholder="S">
      <input id="mod-f" type="number" step="0.01" placeholder="F">
    </div>

    <div class="row">
      <input id="mod-mmin" type="number" step="0.01" placeholder="M/Minuto">
      <input id="mod-s_calc" type="number" step="0.01" placeholder="S calcolata" readonly>
    </div>

    <div class="row">
      <input id="mod-av_ad" type="number" step="0.01" placeholder="Avanzamento Ad">
      <input id="mod-f_calc" type="number" step="0.01" placeholder="F calcolata" readonly>
    </div>

    <div class="row">
      <textarea id="mod-zap" placeholder="Z-Ap" class="cell"></textarea>

      <div class="xy-ae-wrapper cell">
        <textarea id="mod-xyae_val" placeholder="XY-Ae"></textarea>
        <select id="mod-xyae_unit" class="xy-ae-select">
          <option value="mm">mm</option>
          <option value="%">%</option>
        </select>
      </div>
    </div>

    <div class="row">
      <select id="mod-materiale">
        <option>Acciaio</option>
        <option>Temprato</option>
        <option>Inox</option>
        <option>Ghisa</option>
        <option>Alluminio</option>
        <option>Titanio</option>
        <option>Ottone</option>
        <option>Rame</option>
        <option>Plastica</option>
        <option>Altro</option>
      </select>

      <select id="mod-refrigerante">
        <option>Acqua</option>
        <option>Aria</option>
        <option>Niente</option>
        <option>Acqua int.</option>
        <option>Aria int.</option>
      </select>
    </div>

    <textarea id="mod-codice_fresa" placeholder="Codice fresa"></textarea>
    <textarea id="mod-codice_inserto" placeholder="Codice inserto"></textarea>
    <textarea id="mod-dettagli" placeholder="Dettagli"></textarea>

    <div class="modal-actions">
      <button class="btn-annulla" id="modal-annulla">❌ Annulla</button>
      <button class="btn-salva-modifica" id="modal-salva">✅ Salva</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
