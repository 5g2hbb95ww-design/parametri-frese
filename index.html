<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Parametri Frese & Programmazione</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#050814">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="glass volumetric">
  <div class="app-title">Parametri Frese & Programmazione</div>
  <div class="view-selector">
    <select id="viewSelect">
      <option value="nuovo">Nuovo utensile</option>
      <option value="archivio">Archivio frese</option>
      <option value="programmazione">Programmazione</option>
    </select>
  </div>
</header>

<main>

<!-- PAGINA NUOVO -->
<section id="page-nuovo" class="page active">
  <div class="card glass volumetric">
    <h2>Nuovo utensile</h2>

    <label for="denominazione_fresa">Denominazione fresa</label>
    <input id="denominazione_fresa" type="text">

    <div class="row">
      <div class="col">
        <label for="diametro">Diametro (mm)</label>
        <input id="diametro" type="number" step="0.01">
      </div>
      <div class="col">
        <label for="taglienti">Taglienti (z)</label>
        <input id="taglienti" type="number">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label for="s">S (giri/min)</label>
        <input id="s" type="number">
      </div>
      <div class="col">
        <label for="mmin">Vc (m/min)</label>
        <input id="mmin" type="number" step="0.1">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label for="s_calc">S calcolata</label>
        <input id="s_calc" type="number">
      </div>
      <div class="col">
        <label for="avanzamento">fz (mm/dente)</label>
        <input id="avanzamento" type="number" step="0.01">
      </div>
    </div>

    <label for="f_calc">F calcolata (mm/min)</label>
    <input id="f_calc" type="number">

    <div class="row">
      <div class="col">
        <label for="zap">Z ap (mm)</label>
        <input id="zap" type="number" step="0.01">
      </div>
      <div class="col">
        <label for="xyae">XY ae (mm)</label>
        <input id="xyae" type="number" step="0.01">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label for="refrigerante">Refrigerante</label>
        <select id="refrigerante"></select>
      </div>
      <div class="col">
        <label for="materiale">Materiale</label>
        <select id="materiale"></select>
      </div>
    </div>

    <label for="codice_fresa">Codice fresa</label>
    <input id="codice_fresa" type="text">

    <label for="codice_inserto">Codice inserto</label>
    <input id="codice_inserto" type="text">

    <label for="dettagli">Dettagli / Note</label>
    <textarea id="dettagli" rows="3"></textarea>

    <button id="btnSalva" class="btn-primary">Salva utensile</button>
  </div>
</section>

<!-- PAGINA ARCHIVIO -->
<section id="page-archivio" class="page">
  <div class="card glass volumetric">
    <h2>Archivio frese</h2>

    <div class="row">
      <div class="col">
        <label for="sortSelect">Ordina per</label>
        <select id="sortSelect">
          <option value="denominazione">Denominazione</option>
          <option value="diametro">Diametro</option>
          <option value="materiale">Materiale</option>
        </select>
      </div>
      <div class="col">
        <label for="orderSelect">Ordine</label>
        <select id="orderSelect">
          <option value="asc">Crescente</option>
          <option value="desc">Decrescente</option>
        </select>
      </div>
    </div>

    <div id="lista"></div>
    <button id="btnExport" class="btn-secondary">Esporta CSV</button>
  </div>
</section>

<!-- PAGINA PROGRAMMAZIONE -->
<section id="page-programmazione" class="page">
  <div class="card glass volumetric">
    <h2>Programmazione / Scheda lavoro</h2>

    <label for="prog_macchina">Macchina CNC</label>
    <select id="prog_macchina"></select>

    <label for="prog_commessa">Commessa</label>
    <input id="prog_commessa" type="text">

    <label for="prog_disegno">Disegno</label>
    <input id="prog_disegno" type="text">

    <label for="prog_rev">Revisione</label>
    <input id="prog_rev" type="text">

    <label for="prog_tempo">Tempo programmazione (min)</label>
    <input id="prog_tempo" type="number">

    <label for="prog_operatore">Operatore CNC</label>
    <select id="prog_operatore"></select>

    <label for="prog_stato">Stato</label>
    <select id="prog_stato">
      <option value="in_programmazione">In programmazione</option>
      <option value="programmato">Programmato</option>
      <option value="in_produzione">In produzione</option>
      <option value="sospeso">Sospeso</option>
      <option value="finito">Programmato e prodotto</option>
    </select>

    <label for="prog_note">Note</label>
    <textarea id="prog_note" rows="3"></textarea>

    <button id="btnSalvaProgrammazione" class="btn-primary">Salva scheda lavoro</button>
  </div>

  <div class="card glass volumetric">
    <h2>Lista schede lavoro</h2>
    <div id="prog_lista"></div>
  </div>

  <div class="card glass volumetric">
    <h2>Timeline</h2>
    <div id="prog_timeline"></div>
    <button id="btnExportPDF" class="btn-secondary">Esporta scheda (PDF)</button>
  </div>
</section>

</main>

<!-- POPUP MODIFICA UTENSILE -->
<div id="modalEdit" class="modal hidden glass volumetric">
  <h2>Modifica utensile</h2>

  <label for="edit_denominazione">Denominazione</label>
  <input id="edit_denominazione" type="text">

  <label for="edit_diametro">Diametro</label>
  <input id="edit_diametro" type="number">

  <label for="edit_taglienti">Taglienti</label>
  <input id="edit_taglienti" type="number">

  <label for="edit_s">S</label>
  <input id="edit_s" type="number">

  <label for="edit_avanzamento">fz</label>
  <input id="edit_avanzamento" type="number">

  <label for="edit_materiale">Materiale</label>
  <select id="edit_materiale"></select>

  <label for="edit_refrigerante">Refrigerante</label>
  <select id="edit_refrigerante"></select>

  <label for="edit_dettagli">Dettagli</label>
  <textarea id="edit_dettagli"></textarea>

  <button id="btnUpdate" class="btn-primary">Salva modifiche</button>
  <button id="btnCloseModal" class="btn-secondary">Chiudi</button>
</div>

<!-- POPUP MODIFICA PROGRAMMAZIONE -->
<div id="modalEditProg" class="modal hidden glass volumetric">
  <h2>Modifica scheda lavoro</h2>

  <label for="edit_prog_macchina">Macchina</label>
  <select id="edit_prog_macchina"></select>

  <label for="edit_prog_commessa">Commessa</label>
  <input id="edit_prog_commessa" type="text">

  <label for="edit_prog_disegno">Disegno</label>
  <input id="edit_prog_disegno" type="text">

  <label for="edit_prog_rev">Revisione</label>
  <input id="edit_prog_rev" type="text">

  <label for="edit_prog_tempo">Tempo</label>
  <input id="edit_prog_tempo" type="number">

  <label for="edit_prog_operatore">Operatore</label>
  <select id="edit_prog_operatore"></select>

  <label for="edit_prog_stato">Stato</label>
  <select id="edit_prog_stato">
    <option value="in_programmazione">In programmazione</option>
    <option value="programmato">Programmato</option>
    <option value="in_produzione">In produzione</option>
    <option value="sospeso">Sospeso</option>
    <option value="finito">Programmato e prodotto</option>
  </select>

  <label for="edit_prog_note">Note</label>
  <textarea id="edit_prog_note"></textarea>

  <button id="btnUpdateProg" class="btn-primary">Salva modifiche</button>
  <button id="btnCloseModalProg" class="btn-secondary">Chiudi</button>
</div>

<script src="app.js"></script>
</body>
</html>
