<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Parametri Frese</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS principale -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <h1>Parametri Frese</h1>
            <p>Gestione parametri con salvataggio locale</p>
        </header>

        <main class="app-layout">
            <!-- Sezione XY-Ae -->
            <section class="app-section">
                <div class="section-header">
                    <h2>XY-Ae</h2>
                    <p>Parametri asse XY</p>
                </div>

                <!-- RIGA 1 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 1</label>
                        <!-- INSERISCI QUI IL TUO INPUT / TEXTAREA SX -->
                        <input type="text" class="field-input" placeholder="Valore SX 1">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 1</label>
                        <!-- INSERISCI QUI IL TUO INPUT / TEXTAREA DX -->
                        <input type="text" class="field-input" placeholder="Valore DX 1">
                    </div>
                </div>

                <!-- RIGA 2 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 2</label>
                        <input type="text" class="field-input" placeholder="Valore SX 2">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 2</label>
                        <input type="text" class="field-input" placeholder="Valore DX 2">
                    </div>
                </div>

                <!-- QUI PUOI AGGIUNGERE ALTRE RIGHE XY-Ae CON LO STESSO SCHEMA -->

                <div class="section-footer">
                    <button class="btn-primary">Salva XY-Ae</button>
                </div>
            </section>

            <!-- Sezione Z-Ap -->
            <section class="app-section">
                <div class="section-header">
                    <h2>Z-Ap</h2>
                    <p>Parametri asse Z</p>
                </div>

                <!-- RIGA 1 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 1</label>
                        <!-- INSERISCI QUI IL TUO INPUT / TEXTAREA SX -->
                        <input type="text" class="field-input" placeholder="Valore SX 1">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 1</label>
                        <!-- INSERISCI QUI IL TUO INPUT / TEXTAREA DX -->
                        <input type="text" class="field-input" placeholder="Valore DX 1">
                    </div>
                </div>

                <!-- RIGA 2 -->
                <div class="app-row">
                    <div class="app-card">
                        <label class="field-label">Campo SX 2</label>
                        <input type="text" class="field-input" placeholder="Valore SX 2">
                    </div>
                    <div class="app-card">
                        <label class="field-label">Campo DX 2</label>
                        <input type="text" class="field-input" placeholder="Valore DX 2">
                    </div>
                </div>

                <!-- QUI PUOI AGGIUNGERE ALTRE RIGHE Z-Ap CON LO STESSO SCHEMA -->

                <div class="section-footer">
                    <button class="btn-primary">Salva Z-Ap</button>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Archivio parametri frese · LocalStorage attivo</p>
        </footer>
    </div>

    <!-- Il tuo JS esistente rimane invariato -->
    <script src="app.js"></script>
</body>
</html>
