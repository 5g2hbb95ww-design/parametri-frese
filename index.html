<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Parametri Frese</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icona -->
    <link rel="icon" type="image/png" href="icons/icon-192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="nav">
            <span class="logo">Parametri Frese</span>
            <button id="btn-archive" class="btn-secondary">Archivio</button>
        </nav>

        <div class="card">
            <h2>Nuovo parametro</h2>

            <div class="input-group">
                <label for="nome">Nome lavorazione</label>
                <input type="text" id="nome" placeholder="Es. Spianatura C45">
            </div>

            <div class="input-group">
                <label for="materiale">Materiale</label>
                <input type="text" id="materiale" placeholder="Es. C45, Ergal, Inox...">
            </div>

            <div class="input-group">
                <label for="diametro">Diametro fresa (mm)</label>
                <input type="number" id="diametro" step="0.1" placeholder="Es. 20">
            </div>

            <div class="input-group">
                <label for="z">Numero taglienti (Z)</label>
                <input type="number" id="z" placeholder="Es. 4">
            </div>

            <div class="input-group">
                <label for="vc">Velocità di taglio Vc (m/min)</label>
                <input type="number" id="vc" step="1" placeholder="Es. 180">
            </div>

            <div class="input-group">
                <label for="fz">Avanzamento per dente fz (mm/dente)</label>
                <input type="number" id="fz" step="0.01" placeholder="Es. 0.12">
            </div>

            <button id="btn-calcola" class="btn-primary">Calcola e salva</button>
        </div>

        <div class="card">
            <h2>Risultati</h2>
            <p><strong>Giri mandrino (n):</strong> <span id="out-n">-</span> rpm</p>
            <p><strong>Avanzamento (Vf):</strong> <span id="out-vf">-</span> mm/min</p>
        </div>

        <div class="card" id="archive-card" style="display:none;">
            <h2>Archivio parametri salvati</h2>
            <div id="archive-list"></div>
            <button id="btn-close-archive" class="btn-secondary">Chiudi archivio</button>
        </div>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
