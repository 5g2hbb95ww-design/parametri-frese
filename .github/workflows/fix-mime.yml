name: Fix MIME for JS
on:
  push:
    branches: [ main ]

jobs:
  fix-mime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Add .nojekyll
        run: echo "" > .nojekyll
      - name: Commit
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "GitHub Actions"
          git add .nojekyll
          git commit -m "Fix MIME"
          git push
